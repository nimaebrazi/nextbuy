server:
  port: 9091

spring:
  profiles:
    active: dev
  main:
    banner-mode: off
  application:
    name: adhub


  datasource:
    url: jdbc:postgresql://localhost:5432/adhub
    username: adhub
    password: adhub

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  modulith:
    events:
      jdbc-schema-initialization:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,modulith
