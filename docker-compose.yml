services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: adhub
      POSTGRES_USER: adhub
      POSTGRES_PASSWORD: adhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ads -d adhub" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: